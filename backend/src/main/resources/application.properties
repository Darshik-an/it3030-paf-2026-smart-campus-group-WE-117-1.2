spring.application.name=backend

# Optional local-only overrides (OAuth secrets, etc.). Gitignored. See backend/local.properties.example.
spring.config.import=optional:file:./local.properties

# Default to an embedded H2 database so the auth/admin flows work locally
# even when MySQL is not running. MySQL can still be used by overriding
# the datasource environment variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/smart-campus;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:smart-campus-default-jwt-secret-key-2026-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth2: configured in backend/local.properties (gitignored). If absent, OAuth login is disabled.

# Frontend URL Configuration
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
